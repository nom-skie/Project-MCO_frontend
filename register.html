<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Register</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav>
      <div class="nav-inner">
        <div class="nav-logo">
          <div class="logo-mark">🏠</div>

          <div>
            <span class="logo-text">E-Proseso</span>
            <span class="logo-sub">Barangay Document System</span>
          </div>
        </div>
      </div>
    </nav>

    <div class="page-center">
      <div class="card">
        <h1 class="page-title">Create Account</h1>

        <p class="page-subtitle">Register for barangay services</p>

        <div class="form-group">
          <label>First Name</label>

          <input type="text" id="fname" />
        </div>

        <div class="form-group">
          <label>Last Name</label>

          <input type="text" id="lname" />
        </div>

        <div class="form-group">
          <label>Email</label>

          <input type="email" id="reg-email" />
        </div>

        <div class="form-group">
          <label>Phone</label>

          <input type="text" id="reg-phone" />
        </div>

        <div class="form-group">
          <label>Password</label>

          <input type="password" id="reg-password" />
        </div>

        <button class="btn btn-primary full-btn" onclick="handleRegister()">
          Create Account
        </button>

        <br /><br />

        <p>
          Already have account?
          <a href="login.html">Login here</a>
        </p>
      </div>
    </div>

    <div id="toast"></div>

    <script src="function.js"></script>
  </body>
</html>
