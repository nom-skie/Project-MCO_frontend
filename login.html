<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav>
      <div class="nav-inner">
        <div class="nav-logo">
          <div class="logo-mark">🏠</div>
          <div>
            <span class="logo-text">E-Proseso</span>
            <span class="logo-sub">Barangay Document System</span>
          </div>
        </div>
      </div>
    </nav>

    <div class="page-center">
      <div class="card">
        <h1 class="page-title">Login</h1>
        <p class="page-subtitle">Access your account</p>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="login-email"
            autocomplete="email"
            placeholder="you@example.com"
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="login-password"
            autocomplete="current-password"
          />
        </div>

        <button type="button" class="btn btn-primary full-btn" onclick="handleLogin()">
          Sign In
        </button>

        <a href="forgotpass.html" class="forgot-link">Forgot password?</a>

        <br /><br />

        <p>
          No account?
          <a href="register.html">Register here</a>
        </p>
      </div>
    </div>

    <div id="toast"></div>
    <script src="config.js"></script>
    <script src="function.js"></script>
  </body>
</html>
