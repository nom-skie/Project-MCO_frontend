<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payments — E-Proseso Admin</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <div class="nav-logo">
        <div class="logo-mark">🏠</div>
        <div>
          <span class="logo-text">E-Proseso</span>
          <span class="logo-sub">Admin Panel</span>
        </div>
      </div>
      <div class="nav-links-admin">
        <a href="admin-dashboard.html" class="nav-link">← Dashboard</a>
        <span class="badge badge-approved badge-admin-nav">Admin</span>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="page-body">
    <h1 class="page-title">Payment records</h1>
    <p class="page-subtitle">Track and update payment status for all document requests.</p>

    <!-- Stats: populated by updatePayStats() in function.js -->
    <div class="stats-grid mb-28">
      <div class="stat-card">
        <div class="stat-icon icon-green">💳</div>
        <div class="stat-val" id="pay-stat-collected">—</div>
        <div class="stat-label">Collected this month</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-yellow">⏳</div>
        <div class="stat-val" id="pay-stat-pending">—</div>
        <div class="stat-label">Unpaid requests</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-blue">📄</div>
        <div class="stat-val" id="pay-stat-free">—</div>
        <div class="stat-label">Free documents</div>
      </div>
    </div>

    <div class="flex-wrap gap-8 mb-20">
      <button class="filter-btn active" onclick="filterPayAdmin('all',this)">All</button>
      <button class="filter-btn" onclick="filterPayAdmin('unpaid',this)">Unpaid</button>
      <button class="filter-btn" onclick="filterPayAdmin('paid',this)">Paid</button>
      <button class="filter-btn" onclick="filterPayAdmin('free',this)">Free</button>
    </div>

    <div class="list-card" id="pay-list"></div>
  </div>

  <div id="pay-modal-overlay" class="modal-overlay">
    <div class="modal-content">
      <h2 class="modal-title">Update payment</h2>
      <p id="pay-modal-info" class="modal-info"></p>

      <div class="form-group">
        <label for="pay-modal-status">Payment status</label>
        <select id="pay-modal-status">
          <option value="unpaid">Unpaid</option>
          <option value="paid">Paid</option>
        </select>
      </div>

      <div class="form-group mb-20">
        <label for="pay-modal-or">Official receipt no. (optional)</label>
        <input type="text" id="pay-modal-or" placeholder="e.g. OR-2026-00123"/>
      </div>

      <div class="flex-wrap gap-10">
        <button class="btn btn-primary" onclick="savePayStatus()">Save</button>
        <button class="btn btn-ghost" onclick="closePayModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="config.js"></script>
  <script src="function.js"></script>
</body>
</html>
